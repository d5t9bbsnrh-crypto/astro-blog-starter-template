<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>RLT Music & Filmworks</title>

    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }

      html,
      body{
        width:100%;
        height:100%;
      }

      body{
        background:#000;
        color:#fff;
        font-family:Arial, Helvetica, sans-serif;
        overflow-x:hidden;
      }

      .hero{
        position:relative;

        width:100%;
        min-height:100vh;

        background:
          linear-gradient(
            rgba(0,0,0,.45),
            rgba(0,0,0,.45)
          ),
          url("/images/rlt-homepage.png");

        background-size:cover;
        background-position:center center;
        background-repeat:no-repeat;

        display:flex;
        justify-content:center;
        align-items:center;

        text-align:center;
        padding:40px 20px;
      }

      .content{
        max-width:900px;
      }

      h1{
        font-size:clamp(2.8rem, 7vw, 5.5rem);
        letter-spacing:5px;
        margin-bottom:20px;
      }

      p{
        font-size:clamp(1rem, 2vw, 1.5rem);
        line-height:1.6;
      }

      .buttons{
        margin-top:40px;

        display:flex;
        gap:20px;
        justify-content:center;
        flex-wrap:wrap;
      }

      .btn{
        padding:14px 30px;
        border:2px solid white;

        color:white;
        text-decoration:none;

        transition:.3s ease;
      }

      .btn:hover{
        background:white;
        color:black;
      }
    </style>
  </head>

  <body>

    <section class="hero">

      <div class="content">

        <h1>RLT MUSIC & FILMWORKS</h1>

        <p>
          Real Music. Real Stories. Real Impact.
        </p>

        <div class="buttons">
          <a href="#" class="btn">Explore Music</a>
          <a href="#" class="btn">View Films</a>
        </div>

      </div>

    </section>

  </body>
</html>

          Real Music. Real Stories. Real Impact.
        </p>
      </div>
    </section>

  </body>
</html>
