---

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RLT Music & Filmworks</title>

    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }

      body{
        background:#000;
        font-family:Arial, Helvetica, sans-serif;
        overflow-x:hidden;
      }

      .hero{
        width:100%;
        height:100vh;

        background-image:url('/images/rlt-homepage.png');
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
      }

      .overlay{
        width:100%;
        height:100%;
        background:rgba(0,0,0,.35);

        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;

        color:white;
        text-align:center;
      }

      h1{
        font-size:4rem;
        letter-spacing:4px;
      }

      p{
        margin-top:20px;
        font-size:1.2rem;
      }
    </style>
  </head>

  <body>

    <section class="hero">
      <div class="overlay">
        <h1>RLT MUSIC & FILMWORKS</h1>

        <p>
          Real Music. Real Stories. Real Impact.
        </p>
      </div>
    </section>

  </body>
</html>
